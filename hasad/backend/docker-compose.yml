services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hasad_db_dev
    ports:
      - "5432:5432"
    volumes:
      - hasad_db_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d hasad_db_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hasad_db_dev_data:
