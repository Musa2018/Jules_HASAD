name: mobile
description: "HASAD - Agricultural Damage Assessment System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # API & Serialization
  dio: ^5.4.3+1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Database
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Utils
  intl: ^0.20.2

  # GIS & Sensors
  flutter_map: ^7.0.2
  geolocator: ^12.0.0
  camera: ^0.11.0+1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
  generate: true
